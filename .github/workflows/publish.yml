name: Buid and Publish Package to PyPI

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      # Required for passwordless OpenID Connect (OIDC) authentication with PyPI
      id-token: write
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v7
      with:
        python-version: "3.12"

    - name: Install Hatchling and Build Tools
      run: |
        python -m pip install --upgrade pip
        pip install build

    - name: Build Package Distributions
      run: python -m build

    - name: Publish to TestPyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://test.pypi.org/legacy/
