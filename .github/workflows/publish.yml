name: Buid and Publish Package to PyPI

on:
  release:
    types: [published]

jobs:
  build-dist:
    name: Build Package Distributions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Build Tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build Package Distributions
        run: python -m build

      - name: Upload built distributions
        uses: actions/upload-artifact@v4
        with:
          name: pypi-dist-files
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build-dist
    runs-on: ubuntu-latest
    environment:
      name: dev-pypi
      url: https://test.pypi.org/p/coralogix-otel-logger
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: pypi-dist-files
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish-pypi:
    name: Publish to PyPI
    needs: publish-testpypi
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/coralogix-otel-logger
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: pypi-dist-files
          path: dist/

      - name: Publish to Real PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
